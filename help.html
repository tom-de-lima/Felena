<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GranaCheck - Ajuda</title>
    <link rel="stylesheet" href="/style2.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="side-rail">
        <div class="rail-brand">
          <img src="/Icon-removebg-preview.png" alt="Logo GranaCheck" />
          <div>
            <strong>GranaCheck</strong>
            <span>Finance Dashboard</span>
          </div>
        </div>
        <nav class="rail-nav">
          <button type="button" class="rail-item" data-nav="login" data-route="/app/login">Login</button>
          <button type="button" class="rail-item" data-nav="entradas" data-route="/app/entradas">Entradas Financeiras</button>
          <button type="button" class="rail-item" data-nav="historico" data-route="/app/historico">Histórico</button>
          <button type="button" class="rail-item" data-nav="info-calculo" data-route="/app/informacoes-calculo">Informações Úteis de Cálculo</button>
          <button type="button" class="rail-item" data-nav="comprometimento-reserva" data-route="/app/comprometimento-reserva">Comprometimento e Reserva</button>
          <button type="button" class="rail-item active" data-nav="ajuda" data-route="/app/ajuda">Ajuda</button>
          <button type="button" class="rail-item" data-nav="conta" data-route="/app/conta">Conta</button>
        </nav>
        <div class="rail-footer">Versão estável</div>
      </aside>

      <main class="workspace">
        <header class="app-topbar">
          <div class="brand">
            <div>
              <h1>Ajuda - Como usar o app</h1>
              <p>Guia prático com explicações dos campos, resultados e regras de cálculo</p>
            </div>
          </div>
          <div id="user-badge" class="user-badge hidden">
            <span id="user-name"></span>
            <button id="logout-btn" type="button">Sair</button>
          </div>
        </header>

        <section id="message-banner" class="message-banner hidden"></section>

        <div class="content-grid single-page">
          <section class="card info-card">
            <h2>Visão geral</h2>
            <p id="help-overview-text">Carregando informações...</p>
            <p id="help-impact-text" class="help-muted"></p>
            <p id="help-last-example" class="help-muted"></p>
          </section>

          <section class="card">
            <h2>Perguntas frequentes (FAQ)</h2>
            <div id="help-faq-list" class="faq-list"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/app-common.js" defer></script>
    <script src="/help-page.js" defer></script>
  </body>
</html>
