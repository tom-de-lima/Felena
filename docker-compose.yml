services:
  granacheck:
    container_name: granacheck_app
    build:
      context: .
      dockerfile: Dockerfile
    image: granacheck:latest
    restart: always
    ports:
    - "80:3000"    environment:
      NODE_ENV: production
      PORT: 3000
      APP_TIMEZONE: America/Fortaleza
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  sqlite_data:
    name: granacheck_sqlite_data
