<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GranaCheck - Histórico</title>
    <link rel="stylesheet" href="/style2.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="side-rail">
        <div class="rail-brand">
          <img src="/Icon-removebg-preview.png" alt="Logo GranaCheck" />
          <div>
            <strong>GranaCheck</strong>
            <span>Finance Dashboard</span>
          </div>
        </div>
        <nav class="rail-nav">
          <button type="button" class="rail-item" data-nav="login" data-route="/app/login">Login</button>
          <button type="button" class="rail-item" data-nav="entradas" data-route="/app/entradas">Entradas Financeiras</button>
          <button type="button" class="rail-item active" data-nav="historico" data-route="/app/historico">Histórico</button>
          <button type="button" class="rail-item" data-nav="info-calculo" data-route="/app/informacoes-calculo">Informações Úteis de Cálculo</button>
          <button type="button" class="rail-item" data-nav="conta" data-route="/app/conta">Conta</button>
        </nav>
        <div class="rail-footer">Versão estável</div>
      </aside>

      <main class="workspace">
        <header class="app-topbar">
          <div class="brand">
            <div>
              <h1>Histórico Mensal</h1>
              <p>Registros de valores calculados e armazenados</p>
            </div>
          </div>
          <div id="user-badge" class="user-badge hidden">
            <span id="user-name"></span>
            <button id="logout-btn" type="button">Sair</button>
          </div>
        </header>

        <section id="message-banner" class="message-banner hidden"></section>

        <div class="content-grid single-page">
          <section class="card info-card">
            <h2>Resumo do histórico</h2>
            <p id="history-summary-text">Carregando dados...</p>
          </section>

          <section id="history-card" class="card">
            <h2>Históricos mensais</h2>
            <ul id="history-list" class="history-list"></ul>
          </section>
        </div>
      </main>
    </div>
    <script src="/app-common.js" defer></script>
    <script src="/history-page.js" defer></script>
  </body>
</html>
